<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Smooth Tab</title> <!-- A fallback title -->
    
    <link rel="stylesheet" href="welcome.css">
    <!-- content.css is included to make the double-click animation available on this page. -->
    <link rel="stylesheet" href="content.css">
</head>
<body>

<div class="container">
    <header>
        <img src="openinnewtab_96.png" width="96" height="96" alt="Smooth Tab Logo">
        <!-- The `i18n` attribute hooks into the localization script. -->
        <h1 i18n="thankHeader"></h1>
    </header>

    <section>
        <p i18n="thankBody"></p>
        
        <!-- This card provides users with key links and serves as a sandbox to test the extension. -->
        <div class="link-card">
            <ul>
                <!-- `rel="noreferrer"` is a security best practice for external links. -->
                <li><a href="https://github.com/ryyr-ry/Smooth-Tab" i18n="linkToGitHub" rel="noreferrer" target="_blank"></a></li>
                <li><a href="https://sites.google.com/view/smooth-tab/privacy" i18n="linkToPrivacy" rel="noreferrer" target="_blank"></a></li>
            </ul>
        </div>
    </section>

    <footer i18n="thankFooter"></footer>
</div>
  
<script src="welcome.js"></script>
<!-- 
  The main content script is included here. This is a crucial design choice that enables
  the double-click functionality on the welcome page itself, providing an immediate,
  interactive demonstration of the extension's core feature right after installation.
-->
<script src="content.js"></script>
</body>
</html>
