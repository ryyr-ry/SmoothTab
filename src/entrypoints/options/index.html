<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="manifest.open_in_tab" content="true">
    <title>Smooth Tab Settings</title>
</head>
<body>
<div class="container">
    <header>
        <h1 i18n="optionsTitle"></h1>
    </header>

    <form onsubmit="return false;">
        <div class="card">
            <div class="form-group">
                <label for="openTabFront" i18n="optionOpenFront"></label>
                <label class="switch">
                    <input type="checkbox" id="openTabFront">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-group">
                <label for="openTabEnd" i18n="optionOpenEnd"></label>
                <label class="switch">
                    <input type="checkbox" id="openTabEnd">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-group">
                <div class="form-group-label-with-helper">
                    <label for="highPerformanceMode" i18n="optionHighPerformanceMode"></label>
                    <p class="helper-text" i18n="optionHighPerformanceModeHelper"></p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="highPerformanceMode">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-group">
                <div class="form-group-label-with-helper">
                    <label for="enableYouTubeFix" i18n="optionYouTubeFix"></label>
                    <p class="helper-text" i18n="optionYouTubeFixHelper"></p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="enableYouTubeFix">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="delay" i18n="tap_delay_ms"></label>
                <input type="number" id="delay" name="delay" autocomplete="off" value="300" min="200" max="1000" step="10">
            </div>
            <div id="clicktest">
                <span id="clickme" i18n="clickme"></span>
                <span id="singleclick-status" i18n="singleclick"></span>
                <span id="dblclick-status" i18n="dblclick"></span>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <div class="form-group-label-with-helper">
                    <label for="enableRightDoubleClickClose" i18n="optionRightDoubleClickClose"></label>
                    <p class="helper-text" i18n="optionRightDoubleClickCloseHelper"></p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="enableRightDoubleClickClose">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-group">
                <div class="form-group-label-with-helper">
                    <label for="protectPinnedTabs" i18n="optionProtectPinnedTabs"></label>
                    <p class="helper-text" i18n="optionProtectPinnedTabsHelper"></p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="protectPinnedTabs">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-group">
                <label for="rightDoubleClickDelay" i18n="rightDoubleClickDelayLabel"></label>
                <input type="number" id="rightDoubleClickDelay" name="rightDoubleClickDelay" autocomplete="off" value="500" min="100" max="2000" step="10">
            </div>
            <div id="right-click-test">
                <span id="right-click-test-label" i18n="rightClickTestLabel"></span>
                <span id="right-click-test-status" i18n="rightClickTestWaiting"></span>
            </div>
        </div>

        <div class="card">
            <label for="blacklist" class="blacklist-label" i18n="blacklist"></label>
            <textarea id="blacklist" autocorrect="off" autocapitalize="off" autocomplete="off" spellcheck="false" placeholder="example.com&#10;mail.example.com"></textarea>
        </div>
    </form>
</div>
<script type="module" src="./main.ts"></script>
</body>
</html>
